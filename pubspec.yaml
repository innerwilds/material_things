name: material_things
description: "A new Flutter package project."
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.6.2
  flutter: ">=1.17.0"

dependencies:
  # Used with Country inputs. In case of a phone code +7 it is preferred to choose current user country
  # rather than first match when matching user-input with country list.
  telephony:
    path: ../telephony
  flutter_things:
    path: ../flutter_things
  flutter:
    sdk: flutter
  freezed_annotation: ^2.4.4
  collection: ^1.19.0
  logger: ^2.5.0
  dart_things:
    git: https://github.com/innerwilds/dart_things

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.8
  build_runner: ^2.4.14

flutter:
  assets:
    - assets/countries.txt